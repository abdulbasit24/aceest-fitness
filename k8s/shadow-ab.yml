# ── Shadow Deployment ────────────────────────────────────────────────────────
# Shadow receives mirrored traffic but responses are discarded
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-shadow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-shadow
  template:
    metadata:
      labels:
        app: aceest-shadow
    spec:
      containers:
        - name: aceest-shadow
          image: abdulbasit2024tm93641/aceest-fitness:v3.0
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-shadow-service
spec:
  selector:
    app: aceest-shadow
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP

---
# ── A/B Testing ───────────────────────────────────────────────────────────────
# Version A
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-version-a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      variant: a
  template:
    metadata:
      labels:
        app: aceest-fitness
        variant: a
    spec:
      containers:
        - name: aceest-fitness
          image: abdulbasit2024tm93641/aceest-fitness:v1.0
          ports:
            - containerPort: 5000
          env:
            - name: APP_VARIANT
              value: "A"
---
# Version B
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-version-b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      variant: b
  template:
    metadata:
      labels:
        app: aceest-fitness
        variant: b
    spec:
      containers:
        - name: aceest-fitness
          image: abdulbasit2024tm93641/aceest-fitness:v2.0
          ports:
            - containerPort: 5000
          env:
            - name: APP_VARIANT
              value: "B"