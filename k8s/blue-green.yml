# Blue deployment (current stable - v1)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      slot: blue
  template:
    metadata:
      labels:
        app: aceest-fitness
        slot: blue
        version: v1
    spec:
      containers:
        - name: aceest-fitness
          image: abdulbasit2024tm93641/aceest-fitness:v1.0
          ports:
            - containerPort: 5000
---
# Green deployment (new version - v2)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      slot: green
  template:
    metadata:
      labels:
        app: aceest-fitness
        slot: green
        version: v2
    spec:
      containers:
        - name: aceest-fitness
          image: abdulbasit2024tm93641/aceest-fitness:v2.0
          ports:
            - containerPort: 5000
---
# Service – switch between blue/green by changing 'slot' value
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-service
spec:
  selector:
    app: aceest-fitness
    slot: blue        # change to 'green' to switch traffic
  ports:
    - port: 80
      targetPort: 5000
  type: NodePort