# Stable deployment (90% traffic - 9 replicas)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-stable
spec:
  replicas: 9
  selector:
    matchLabels:
      app: aceest-fitness
      track: stable
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: stable
    spec:
      containers:
        - name: aceest-fitness
          image: abdulbasit2024tm93641/aceest-fitness:v1.0
          ports:
            - containerPort: 5000
---
# Canary deployment (10% traffic - 1 replica)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness
      track: canary
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: canary
    spec:
      containers:
        - name: aceest-fitness
          image: abdulbasit2024tm93641/aceest-fitness:v2.0
          ports:
            - containerPort: 5000
---
# Single service routes to BOTH deployments via shared label
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-service
spec:
  selector:
    app: aceest-fitness   # matches both stable + canary pods
  ports:
    - port: 80
      targetPort: 5000
  type: NodePort